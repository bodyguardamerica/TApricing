<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabletop Armory — Pricing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      font-family: Georgia, serif;
    }

    /* ── Header ── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 72px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-bottom: 2px solid #3a2e1e;
    }

    #site-header a {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 6px 16px;
    }

    #site-header img {
      height: 54px;
      width: auto;
      display: block;
    }

    /* ── PDF frame ── */
    #pdf-frame {
      display: none;
      position: fixed;
      top: 72px; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100% - 72px);
      border: none;
    }

    /* ── No-PDF message ── */
    #no-pdf {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: fixed;
      top: 72px; left: 0; right: 0; bottom: 0;
      gap: 1.2rem;
      padding: 2rem;
    }

    #no-pdf .icon { font-size: 3.5rem; }

    #no-pdf h2 {
      font-size: 2rem;
      font-weight: normal;
      color: #c8a97e;
    }

    #no-pdf p {
      font-size: 1.1rem;
      color: #888;
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header id="site-header">
    <a href="https://tabletoparmory.store" target="_blank" rel="noopener">
      <img src="logo-banner.png" alt="Tabletop Armory" />
    </a>
  </header>

  <iframe id="pdf-frame" src="pricing.pdf#toolbar=0&navpanes=0&scrollbar=0" title="Price List"></iframe>

  <div id="no-pdf">
    <div class="icon">🎲</div>
    <h2>See you at the next show!</h2>
    <p>Pricing info will be available here when we're set up at an event.</p>
  </div>

  <script>
    fetch('pricing.pdf', { method: 'HEAD' })
      .then(res => {
        if (res.ok) {
          document.getElementById('pdf-frame').style.display = 'block';
        } else {
          document.getElementById('no-pdf').style.display = 'flex';
        }
      })
      .catch(() => {
        document.getElementById('no-pdf').style.display = 'flex';
      });
  </script>

</body>
</html>
