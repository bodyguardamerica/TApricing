<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: Georgia, serif;
    }

    #pdf-frame {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      top: 0; left: 0;
    }

    #no-pdf {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100vh;
      gap: 1.2rem;
      padding: 2rem;
    }

    #no-pdf .icon { font-size: 3.5rem; }

    #no-pdf h2 {
      font-size: 2rem;
      font-weight: normal;
      color: #4a4a4a;
    }

    #no-pdf p {
      font-size: 1.1rem;
      color: #888;
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <iframe id="pdf-frame" src="pricing.pdf#toolbar=0&navpanes=0&scrollbar=0" title="Price List"></iframe>

  <div id="no-pdf">
    <div class="icon">🎲</div>
    <h2>See you at the next show!</h2>
    <p>Pricing info will be available here when we're set up at an event.</p>
  </div>

  <script>
    fetch('pricing.pdf', { method: 'HEAD' })
      .then(res => {
        if (res.ok) {
          document.getElementById('pdf-frame').style.display = 'block';
        } else {
          document.getElementById('no-pdf').style.display = 'flex';
        }
      })
      .catch(() => {
        document.getElementById('no-pdf').style.display = 'flex';
      });
  </script>

</body>
</html>
