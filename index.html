<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabletop Armory — Pricing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #1a1a1a;
      font-family: Georgia, serif;
    }

    /* ── Header ── */
    #site-header {
      position: sticky;
      top: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-bottom: 2px solid #3a2e1e;
      padding: 8px 12px;
    }

    #site-header a {
      display: flex;
      align-items: center;
    }

    #site-header img {
      height: auto;
      max-height: 100px;
      max-width: calc(100vw - 24px);
      width: auto;
      display: block;
    }

    /* ── PDF canvas area ── */
    #pdf-container {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 2rem;
      gap: 12px;
    }

    #pdf-container canvas {
      display: block;
      max-width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    /* ── No-PDF message ── */
    #no-pdf {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 60vh;
      gap: 1.2rem;
      padding: 2rem;
    }

    #no-pdf .icon { font-size: 3.5rem; }

    #no-pdf h2 {
      font-size: 2rem;
      font-weight: normal;
      color: #c8a97e;
    }

    #no-pdf p {
      font-size: 1.1rem;
      color: #888;
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header id="site-header">
    <a href="https://tabletoparmory.store" target="_blank" rel="noopener">
      <img src="logo-banner.png" alt="Tabletop Armory" />
    </a>
  </header>

  <div id="pdf-container"></div>

  <div id="no-pdf">
    <div class="icon">🎲</div>
    <h2>See you at the next show!</h2>
    <p>Pricing info will be available here when we're set up at an event.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

    const container = document.getElementById('pdf-container');
    const noPdf    = document.getElementById('no-pdf');

    async function loadPDF() {
      try {
        const res = await fetch('pricing.pdf', { method: 'HEAD' });
        if (!res.ok) throw new Error('not found');

        const pdf = await pdfjsLib.getDocument('pricing.pdf').promise;
        container.style.display = 'flex';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page     = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: window.devicePixelRatio * 1.5 });

          const canvas = document.createElement('canvas');
          const ctx    = canvas.getContext('2d');
          canvas.width  = viewport.width;
          canvas.height = viewport.height;
          canvas.style.width  = Math.min(viewport.width / window.devicePixelRatio, window.innerWidth - 8) + 'px';
          canvas.style.height = 'auto';

          await page.render({ canvasContext: ctx, viewport }).promise;
          container.appendChild(canvas);
        }
      } catch {
        noPdf.style.display = 'flex';
      }
    }

    loadPDF();
  </script>

</body>
</html>
