<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #faf8f4;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #2c2c2c;
      color: #faf8f4;
      padding: 1.2rem 2rem;
      text-align: center;
      letter-spacing: 0.08em;
      font-size: 1.1rem;
    }

    #content {
      flex: 1;
      width: 100%;
      max-width: 900px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* PDF viewer */
    #pdf-frame {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      display: none;
    }

    /* No-PDF message */
    #no-pdf {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.2rem;
      padding: 4rem 2rem;
    }

    #no-pdf .icon {
      font-size: 3.5rem;
    }

    #no-pdf h2 {
      font-size: 2rem;
      font-weight: normal;
      color: #4a4a4a;
    }

    #no-pdf p {
      font-size: 1.1rem;
      color: #888;
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header>Tabletop Tark &mdash; Pricing</header>

  <div id="content">
    <iframe id="pdf-frame" src="pricing.pdf" title="Price List"></iframe>

    <div id="no-pdf">
      <div class="icon">🎲</div>
      <h2>See you at the next show!</h2>
      <p>Pricing info will be available here when we're set up at an event.</p>
    </div>
  </div>

  <script>
    fetch('pricing.pdf', { method: 'HEAD' })
      .then(res => {
        if (res.ok) {
          document.getElementById('pdf-frame').style.display = 'block';
        } else {
          document.getElementById('no-pdf').style.display = 'flex';
        }
      })
      .catch(() => {
        document.getElementById('no-pdf').style.display = 'flex';
      });
  </script>

</body>
</html>
