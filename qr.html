<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Tabletop Tark Pricing</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #2c2c2c;
      text-align: center;
    }

    canvas {
      border: 1px solid #ddd;
      padding: 16px;
      border-radius: 4px;
    }

    .url {
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 0.03em;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      font-family: Georgia, serif;
      background: #2c2c2c;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    button:hover { background: #444; }

    @media print {
      button { display: none; }
      body { justify-content: flex-start; padding-top: 1rem; }
    }
  </style>
</head>
<body>

  <h1>Tabletop Tark &mdash; Scan for Pricing</h1>
  <canvas id="qr"></canvas>
  <div class="url">pricing.tabletoparmory.store</div>
  <button onclick="window.print()">Print</button>

  <script>
    QRCode.toCanvas(
      document.getElementById('qr'),
      'https://pricing.tabletoparmory.store',
      { width: 300, margin: 1, color: { dark: '#2c2c2c', light: '#ffffff' } }
    );
  </script>

</body>
</html>
